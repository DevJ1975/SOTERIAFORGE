name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Derive affected base/head SHAs
        uses: nrwl/nx-set-shas@v4

      - run: npx nx format:check

      - run: npx nx affected -t lint test build --parallel=3

  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - run: npm ci

      - name: Firestore & Storage security rules tests (emulator)
        run: >-
          npx firebase emulators:exec --only firestore,storage --project demo-rules-test
          "npx nx test data-access --testPathPattern=rules --skip-nx-cache"

  # ---------------------------------------------------------------------------
  # Security gates (SOC 2 CC7 vuln mgmt / CC8 change mgmt). Additive — these do
  # not gate the build; they surface dependency and secret risks on every PR.
  # ---------------------------------------------------------------------------
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Advisory only: surface high/critical advisories on every PR without
      # gating the build (continue-on-error), so day-to-day PRs aren't held
      # hostage by transitive noise. Triage happens via the report + Dependabot.
      - name: npm audit (high+)
        continue-on-error: true
        run: npm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
