name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Format check
        run: npx prettier --check .

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Lint
        run: npx nx run-many -t lint --parallel=3

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Test
        run: npx nx run-many -t test --parallel=2 --ci --coverage

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        project: [learner, admin, superadmin, storefront, functions]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      # One project per runner: no build-time memory contention, and a failing
      # matrix leg names the exact project.
      - name: Build ${{ matrix.project }}
        run: |
          set +e
          npx nx build ${{ matrix.project }} 2>&1 | tee /tmp/build.log
          exit ${PIPESTATUS[0]}
      # Surface the actual error (CI-only failures we cannot otherwise inspect).
      - name: Report build failure
        if: failure() && github.event.pull_request.number
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "$(printf '### CI build (%s) failed\n\n```\n%s\n```\n' '${{ matrix.project }}' "$(tail -c 8000 /tmp/build.log)")"

  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: E2E tests
        run: npx nx e2e learner-e2e

  rules-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # The Firestore emulator requires a JRE.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: npm ci --legacy-peer-deps
      # Use the workspace-pinned firebase-tools (verified locally), not latest global.
      - name: Firestore rules tests (emulator)
        # demo-* project ids run the emulator with no credentials required.
        run: npx firebase emulators:exec --only firestore --project demo-soteria-forge "npx nx test-rules data-access --skip-nx-cache"
