name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for nx affected

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Derive SHAs for nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Format check
        run: npx nx format:check

      - name: Lint (affected)
        run: npx nx affected -t lint --parallel=3

      - name: Test (affected)
        run: npx nx affected -t test --parallel=3 --ci --coverage

      - name: Build (affected)
        run: npx nx affected -t build --parallel=3

  rules-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Install Firebase CLI
        run: npm i -g firebase-tools
      - name: Firestore rules tests (emulator)
        run: firebase emulators:exec --only firestore "npx nx test data-access --testPathPattern=rules"
