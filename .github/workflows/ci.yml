name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Several Angular AOT/SSR builds are memory-hungry on small runners.
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for nx affected

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Derive SHAs for nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Format check
        run: npx nx format:check

      - name: Lint (affected)
        run: npx nx affected -t lint --parallel=3

      - name: Test (affected)
        run: npx nx affected -t test --parallel=3 --ci --coverage

      # Lower parallelism for builds to avoid OOM on 2-vCPU/7GB runners.
      - name: Build (affected)
        run: npx nx affected -t build --parallel=1

  rules-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # The Firestore emulator requires a JRE.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: npm ci --legacy-peer-deps
      # Use the workspace-pinned firebase-tools (verified locally), not latest global.
      - name: Firestore rules tests (emulator)
        # demo-* project ids run the emulator with no credentials required.
        run: npx firebase emulators:exec --only firestore --project demo-soteria-forge "npx nx test-rules data-access --skip-nx-cache"
