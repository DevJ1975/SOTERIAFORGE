# Dependabot — automated dependency & action updates (SOC 2 CC7 vuln mgmt /
# CC8 change mgmt). Weekly cadence; grouped to keep PR noise manageable.
version: 2
updates:
  # npm dependencies (root workspace covers the whole Nx monorepo).
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'America/New_York'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'security'
    groups:
      # Batch low-risk minor/patch bumps into a single PR.
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'

  # GitHub Actions used by our workflows.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'America/New_York'
    open-pull-requests-limit: 5
    labels:
      - 'ci'
      - 'security'
