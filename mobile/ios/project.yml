name: SoteriaAssurance
options:
  bundleIdPrefix: com.soteria
  deploymentTarget:
    iOS: '16.0'
  createIntermediateGroups: true

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    minVersion: '11.0.0'

targets:
  SoteriaAssurance:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: GoogleService-Info.plist
        optional: true
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.soteria.assurance
        MARKETING_VERSION: '0.1.0'
        CURRENT_PROJECT_VERSION: '1'
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Soteria Assurance
        SWIFT_VERSION: '5.0'
